name: Release artifacts
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: existing tag to build and attest (e.g. v2.2.0)
        required: true
permissions:
  contents: read
jobs:
  build-attest-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # upload assets to the release
      id-token: write         # Sigstore OIDC for attestation
      attestations: write     # record the build provenance attestation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade build twine
          python -m build
      - name: Twine metadata check
        run: python -m twine check dist/*
      - name: Attest build provenance (SLSA, Sigstore-signed)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: 'dist/*'
      - name: Upload artifacts to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --generate-notes
          gh release upload "$TAG" dist/* --clobber
