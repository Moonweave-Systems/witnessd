name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: unit (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - name: Checkout witnessd
        uses: actions/checkout@v4

      - name: Clone Depone verifier
        run: git clone --depth=1 https://github.com/Moonweave-Systems/Depone.git "$RUNNER_TEMP/depone"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests against Depone validators
        env:
          PYTHONPATH: ${{ runner.temp }}/depone
          WITNESSD_DEPONE_ROOT: ${{ runner.temp }}/depone
        run: python3 -m unittest discover -s tests -p 'test_*.py'

  revalidate:
    name: revalidate committed evidence fixtures
    runs-on: ubuntu-latest
    steps:
      - name: Checkout witnessd
        uses: actions/checkout@v4

      - name: Clone Depone verifier
        run: git clone --depth=1 https://github.com/Moonweave-Systems/Depone.git "$RUNNER_TEMP/depone"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Re-derive all committed fixture verdicts
        shell: bash
        run: |
          set -euo pipefail
          for script in scripts/revalidate_*.py; do
            echo "== ${script} =="
            PYTHONPATH="$RUNNER_TEMP/depone" WITNESSD_DEPONE_ROOT="$RUNNER_TEMP/depone" python3 "$script"
          done

  quickstart:
    name: quickstart init run verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout witnessd
        uses: actions/checkout@v4

      - name: Clone Depone verifier
        run: git clone --depth=1 https://github.com/Moonweave-Systems/Depone.git "$RUNNER_TEMP/depone"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run quickstart check
        env:
          WITNESSD_DEPONE_ROOT: ${{ runner.temp }}/depone
        run: scripts/quickstart_check.sh

  decoupling-guard:
    name: depone-free runtime guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout witnessd
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Import runtime without Depone installed
        run: python3 -c "import witnessd.emitter, witnessd.__main__"

      - name: Shell lane emits evidence-pending without Depone
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          mkdir -p "$tmp/sandbox" "$tmp/observer"
          python3 -m witnessd run \
            --adapter shell \
            --runner-sandbox "$tmp/sandbox" \
            --out "$tmp/observer/capture-manifest.json" \
            --log "$tmp/observer/runlog.jsonl" \
            --task-id ci-decoupling \
            --allow out.txt \
            -- sh -c 'printf ok > out.txt' | tee "$tmp/stdout.txt"
          grep -q 'evidence-pending' "$tmp/stdout.txt"

  no-overclaim:
    name: no standalone success overclaims
    runs-on: ubuntu-latest
    steps:
      - name: Checkout witnessd
        uses: actions/checkout@v4

      - name: Reject forbidden status strings outside status gate
        shell: bash
        run: |
          set -euo pipefail
          if grep -RIn 'VERIFIED\|DONE\|COMPLETE\|ORCHESTRATION COMPLETE' witnessd/ | grep -v 'witnessd/status.py'; then
            echo 'Forbidden standalone success string outside witnessd/status.py' >&2
            exit 1
          fi

  version-tag-coherence:
    name: version-tag coherence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout witnessd
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Self-test compare logic
        run: python3 scripts/check_version_matches_tag.py --self-test

      - name: Check setup.py version matches latest tag
        run: python3 scripts/check_version_matches_tag.py
