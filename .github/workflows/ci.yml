name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: unit (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install openssl
        run: sudo apt-get update && sudo apt-get install -y openssl
      - name: Clone Depone dev/test dependency
        shell: bash
        run: |
          set -euo pipefail
          # If Depone is private, set DEPONE_TOKEN in repository secrets.
          if [ -n "${{ secrets.DEPONE_TOKEN }}" ]; then
            git clone "https://x-access-token:${{ secrets.DEPONE_TOKEN }}@github.com/Moonweave-Systems/Depone.git" ../depone
          else
            git clone https://github.com/Moonweave-Systems/Depone.git ../depone
          fi
      - name: Unit tests
        run: PYTHONPATH="$PWD/../depone" python3 -m unittest discover -s tests

  revalidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install openssl
        run: sudo apt-get update && sudo apt-get install -y openssl
      - name: Clone Depone dev/test dependency
        shell: bash
        run: |
          set -euo pipefail
          # If Depone is private, set DEPONE_TOKEN in repository secrets.
          if [ -n "${{ secrets.DEPONE_TOKEN }}" ]; then
            git clone "https://x-access-token:${{ secrets.DEPONE_TOKEN }}@github.com/Moonweave-Systems/Depone.git" ../depone
          else
            git clone https://github.com/Moonweave-Systems/Depone.git ../depone
          fi
      - name: Revalidate committed fixtures
        shell: bash
        run: |
          set -euo pipefail
          for script in scripts/revalidate_*.py; do
            PYTHONPATH="$PWD/../depone" python3 "$script"
          done

  decoupling-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install openssl
        run: sudo apt-get update && sudo apt-get install -y openssl
      - name: Runtime imports without Depone
        run: |
          python3 - <<'PY'
          import importlib.util
          assert importlib.util.find_spec('depone') is None
          import witnessd.emitter, witnessd.__main__
          PY
      - name: Shell lane emits evidence-pending without Depone
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          mkdir -p "$tmp/sandbox" "$tmp/evidence"
          python3 -m witnessd run \
            --adapter shell \
            --runner-sandbox "$tmp/sandbox" \
            --out "$tmp/evidence/capture-manifest.json" \
            --log "$tmp/evidence/runlog.jsonl" \
            --allow out.txt \
            -- sh -c 'echo hi > out.txt' | tee "$tmp/stdout.txt"
          grep -q 'evidence-pending' "$tmp/stdout.txt"
          test -f "$tmp/evidence/capture-manifest.json"

  no-overclaim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid standalone VERIFIED success paths
        shell: bash
        run: |
          set -euo pipefail
          matches="$(grep -RIn 'VERIFIED' witnessd tests scripts || true)"
          disallowed="$(printf '%s\n' "$matches" \
            | grep -v '^witnessd/status.py:' \
            | grep -v 'assertNotIn' \
            | grep -v '^scripts/revalidate_w4.py:' \
            || true)"
          if [ -n "$disallowed" ]; then
            printf '%s\n' "$disallowed"
            exit 1
          fi
